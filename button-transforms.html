<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .butt {
            background-color: lightblue;
            border: 2px solid red;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .butt:hover {
            background-color: lightcoral;
            color: antiquewhite;
            transform: scale(0.8);
        }
       
    </style>
</head>
<body>
    <button class="butt">Click me</button>
    
</body>
</html>
